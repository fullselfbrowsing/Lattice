# Lattice PR-Time CI Workflow
# Closes CI-01 (install + typecheck + test + test:types + lint:packages) and CI-02 (40-char SHA pinning).
# Decisions traced to .planning/phases/25-pr-time-ci-workflow/25-CONTEXT.md:
#   D-01 ubuntu-only, D-02 Node 24 only, D-03 sequential gate order,
#   D-04 tarball leak audit, D-05 source-import rename audit, D-06 workflow safety audit,
#   D-07 pnpm-store cache only, D-08 single ci job ubuntu-latest, D-09 PR-only cancel concurrency,
#   D-10 contents: read root permissions, D-11 hard ban on the pwn-request trigger,
#   D-12 40-char SHA pinning, D-13 pnpm/action-setup + setup-node order.
# This workflow has ZERO OIDC capability and ZERO secrets references.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        # Required before typecheck so workspace packages (lattice-cli) can
        # resolve types from the runtime's published exports (./dist/index.d.ts).
        # Without this, tsc cannot find @full-self-browsing/lattice from cli source.
        run: pnpm -r build

      - name: Type-check workspace
        run: pnpm -r typecheck

      - name: Diagnostic dump (workspace symlinks + dist state)
        # Temporary diagnostic for PR #2 CI debug. Resolved after root-cause.
        run: |
          echo '--- workspace symlink from cli ---'
          ls -la packages/lattice-cli/node_modules/@full-self-browsing/ 2>&1 || true
          ls -la packages/lattice-cli/node_modules/@full-self-browsing/lattice/dist/ 2>&1 | head -5 || true
          echo '--- probe from inside lattice-cli ---'
          cat > /tmp/probe.mjs <<'EOF'
          try {
            const m = await import('@full-self-browsing/lattice');
            console.log('import OK, keys:', Object.keys(m).slice(0,5));
          } catch (e) {
            console.log('import FAIL:', e.message);
          }
          EOF
          cp /tmp/probe.mjs packages/lattice-cli/probe.mjs
          (cd packages/lattice-cli && node probe.mjs 2>&1) || true
          rm -f packages/lattice-cli/probe.mjs
          echo '--- run the failing spec in isolation ---'
          (cd packages/lattice-cli && node --input-type=module -e "
          import('./node_modules/@full-self-browsing/lattice/package.json', { with: { type: 'json' } }).then(m => console.log('cli/node_modules/.../package.json contents OK:', JSON.stringify(m.default, null, 2).slice(0, 400))).catch(e => console.log('FAIL:', e.message));
          " 2>&1) || true

      - name: Run unit tests
        run: pnpm -r test

      - name: Validate package types (tsd)
        run: pnpm -r test:types

      - name: Lint packages (publint + attw)
        run: pnpm -r lint:packages

      - name: Audit tarballs for stale names
        run: node scripts/check-tarball-leak.mjs

      - name: Audit source imports for stale rename
        run: node scripts/verify-rename.mjs

      - name: Audit workflows for OIDC and PR-target drift
        run: node scripts/check-workflow-safety.mjs

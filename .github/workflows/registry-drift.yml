# Lattice Registry Drift Workflow
# Phase 33 -- D-19 -- CAPS-04
#
# Weekly cron + manual dispatch. Auto-opens a refresh PR when the
# OpenRouter snapshot diverges from the committed
# packages/lattice/src/capabilities/registry.generated.ts.
#
# PR-time ci.yml does NOT call OpenRouter (per D-19 -- keeps PR loop
# network-free and fast). Drift is checked weekly on a predictable
# cadence (Monday 06:00 UTC) or manually via workflow_dispatch.
#
# Permissions discipline (Phase 28 inheritance):
#   - Workflow-level: contents: read (default-locked-down)
#   - Job-level: contents: write + pull-requests: write (minimum needed)
#   - NO OIDC token-mint scope anywhere (this workflow does not publish;
#     blast-radius mitigation per Phase 28 SUMMARY)
#
# All third-party actions SHA-pinned per CI-02. peter-evans/create-pull-request
# pinned to v8.1.1 SHA per A4 (Node 24 runner support).
#
# Prerequisite repo setting:
#   Settings -> Actions -> General -> Workflow permissions ->
#   "Allow GitHub Actions to create and approve pull requests" (must be enabled)
# Inherited from Phase 29 (changesets/action Version Packages flow needs the same setting).
name: registry-drift

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC (D-19)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    name: refresh
    runs-on: ubuntu-latest
    # Job-scoped permissions -- needs to push branch + open PR + read repo.
    # Deliberately NO OIDC token-mint scope: this workflow does not publish.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate model registry
        run: node scripts/refresh-model-registry.mjs

      - name: Open refresh PR
        # SHA pin per CI-02; v8.1.1 per A4 (Node 24 runner support).
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/refresh-model-registry
          delete-branch: true
          base: main
          commit-message: 'chore(capabilities): refresh model registry from OpenRouter feed'
          title: 'chore(capabilities): refresh model registry from OpenRouter feed'
          body: |
            Automated weekly refresh of `packages/lattice/src/capabilities/registry.generated.ts`.

            Generated by `.github/workflows/registry-drift.yml` from the live OpenRouter
            `/api/v1/models` feed via `scripts/refresh-model-registry.mjs`.

            ### Review checklist

            - [ ] Any new `[classifier] WARN -- unknown prefix ...` lines in the workflow logs that suggest a `scripts/capabilities/classifier.mjs` `PROVIDER_PREFIX_RULES` extension?
            - [ ] Diff matches expected upstream changes (new models, retired models, context window adjustments)?
            - [ ] No unintended schema drift (extra fields, missing fields, reordering)?
            - [ ] Anchor case study `openrouter:openai/gpt-oss-120b` still classifies as `open_weight_instruct` with `internal_envelope_leak` (Phase 33 anchor; do NOT merge if this regresses)?

            This PR is opened by `peter-evans/create-pull-request@v8.1.1`. If you see no diff, the upstream feed is unchanged since the last refresh -- close the PR; the next weekly run will reopen if drift returns.
          labels: |
            automated
            capabilities
